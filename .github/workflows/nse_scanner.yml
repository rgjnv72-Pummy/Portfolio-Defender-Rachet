name: NSE Weekly Whale & Kronos Scanner

on:
  schedule:
    - cron: '30 10 * * 5' # Runs Every Friday at 4:00 PM IST
  workflow_dispatch:      # Manual "Run" button

jobs:
  weekly_scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install nselib pandas_ta niftystocks requests pandas numpy openpyxl

      - name: Execute Whale Scanner
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python whale_scanner.py
