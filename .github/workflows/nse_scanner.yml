name: NSE Weekly Whale Scanner
on:
  schedule:
    - cron: '30 10 * * 5' # Runs every Friday at 4:00 PM IST
  workflow_dispatch:      # Allows manual trigger

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install pandas yfinance requests openpyxl
          # Add any libraries needed for Kronos Forecast

      - name: Execute Whale Scan
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python whale_scanner.py
