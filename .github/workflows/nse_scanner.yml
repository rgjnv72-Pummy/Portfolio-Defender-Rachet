name: NSE Weekly Whale & Kronos Scanner

on:
  schedule:
    - cron: '30 10 * * 5'
  workflow_dispatch:      

jobs:
  weekly_scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install pandas yfinance requests numpy openpyxl

      - name: Execute Whale Scanner
        run: python whale_scanner.py
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
