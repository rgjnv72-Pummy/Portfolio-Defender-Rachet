name: Daily Stock News Delivery

on:
  schedule:
    # 12:30 UTC is 6:00 PM IST
    - cron: '30 12 * * *'
  workflow_dispatch: # Allows manual run for testing

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # Latest version

      - name: Set up Python
        uses: actions/setup-python@v5 # Latest version
        with:
          python-version: '3.11'

      - name: Install Dependencies
        # Added lxml and cryptography to prevent yfinance crashes
        run: |
          pip install --upgrade pip
          pip install yfinance requests pandas lxml cryptography

      - name: Run News Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python news_bot.py
