name: Daily News Delivery

on:
  schedule:
    # Set this 30 minutes after your Guardian report
    # If Guardian is at 6:00 PM IST (12:30 UTC), set this to 13:00 UTC
    - cron: '00 13 * * *'
  workflow_dispatch:

jobs:
  run-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install yfinance requests

      - name: Run News Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python news_bot.py
