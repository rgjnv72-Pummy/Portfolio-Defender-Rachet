name: Kronos Alpha Engine Friday Cron

on:
  schedule:
    # 10:30 UTC is exactly 16:00 (4:30 PM) Indian Standard Time (IST)
    - cron: '30 10 * * 5'
  workflow_dispatch: # Allows manual trigger via the GitHub Actions dashboard tab

jobs:
  run-scanner:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set Up Python Runtime Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Architecture Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install numpy pandas yfinance nselib scikit-learn

    - name: Run Optimized Alpha Scanner
      env:
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      run: python your_script_name.py # Change this if your file has a different name
