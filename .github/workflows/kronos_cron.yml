name: Kronos Alpha Engine Friday Cron

on:
  schedule:
    # 10:30 UTC triggers at exactly 16:00 (4:30 PM) Indian Standard Time (IST) every Friday
    - cron: '30 10 * * 5'
  workflow_dispatch: # Allows you to manually trigger it via the 'Actions' tab anytime

jobs:
  run-scanner:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set Up Python Runtime Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Architecture Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install numpy pandas yfinance nselib scikit-learn

    - name: Run Standalone Dynamic Risk Scanner
      env:
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      run: python kronos_alpha_scanner.py
