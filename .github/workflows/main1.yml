name: Kronos Friday Master Scan

on:
  schedule:
    # Runs at 14:30 UTC (8:00 PM IST) every Friday
    - cron: '30 14 * * 5'
  workflow_dispatch: # Allows you to run it manually anytime

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install yfinance pandas-ta pandas numpy tqdm

      - name: Run Master Scanner
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python master_scanner.py
        
